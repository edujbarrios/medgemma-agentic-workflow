agent:
  name: Diagnosis Assistant
  description: Suggests potential diagnoses based on symptoms and clinical data
  version: 1.0
  
  tasks:
    - name: diagnosis_suggestion
      description: Generate differential diagnosis list
      prompt_template: prompts/diagnosis.jinja2
      output_format: json
      parameters:
        max_suggestions: 5
        include_confidence: true
        include_rationale: true

llm:
  model: medgemma-7b
  base_url: http://localhost:8000
  temperature: 0.2
  max_tokens: 1024
  top_p: 0.9

logging:
  level: INFO

metadata:
  author: Eduardo J. Barrios
  domain: Clinical Diagnosis
  task_type: reasoning
